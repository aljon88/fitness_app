name: ai_fitness_trainer
description: Modern AI-powered fitness app with camera detection
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  camera: ^0.10.5+5
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^6.1.5
  # Lightweight ML dependencies
  # google_ml_kit: ^0.16.0  # Removed - too heavy
  # image: ^4.1.3  # Removed - too heavy

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  test: ^1.24.0
  mockito: ^5.4.2
  build_runner: ^2.4.7

flutter:
  uses-material-design: true