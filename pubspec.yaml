name: fitness_app
description: FitFlow - Professional home workout app with time-based exercises
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  fl_chart: ^0.66.0
  audioplayers: ^5.2.1
  http: ^1.1.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/images/
    - assets/data/programs/
    - assets/data/meals/
    - assets/data/exercises/
